<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 50 }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Serif+SC:wght@400;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- MathJax for equations -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
      },
      svg: { fontCache: 'global' }
    };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

  <style>
    /* ===== CSS Variables ===== */
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --bg-card: #1c2128;
      --border: #30363d;
      --border-light: #484f58;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #6e7681;
      --accent: #58a6ff;
      --accent-glow: rgba(88, 166, 255, 0.15);
      --accent-warm: #f0883e;
      --accent-green: #3fb950;
      --accent-purple: #bc8cff;
      --code-bg: #0d1117;
      --font-display: 'Noto Serif SC', serif;
      --font-body: 'Source Sans 3', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-size: 17px;
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.75;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle background texture */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(88, 166, 255, 0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(188, 140, 255, 0.03) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== Header ===== */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13, 17, 23, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0.8rem 0;
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .site-title {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .site-title:hover { color: var(--accent); }

    .site-nav {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }

    .site-nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 400;
      transition: color 0.2s;
      letter-spacing: 0.02em;
    }

    .site-nav a:hover { color: var(--accent); }

    /* ===== Main Content ===== */
    .site-main {
      flex: 1;
      position: relative;
      z-index: 1;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }

    /* ===== Home Page ===== */
    .home-hero {
      padding: 4rem 0 3rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
    }

    .home-hero h1 {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.75rem;
    }

    .home-hero p {
      color: var(--text-primary);
      font-size: 1.05rem;
      font-weight: 300;
      max-width: 560px;
    }

    .timestamp-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--accent-glow);
      border: 1px solid rgba(88, 166, 255, 0.2);
      border-radius: 6px;
      padding: 0.3rem 0.7rem;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--accent);
      margin-top: 1.2rem;
    }

    .timestamp-badge::before {
      content: '●';
      font-size: 0.5rem;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ===== Post List ===== */
    .post-list { list-style: none; }

    .post-item {
      padding: 1.8rem 0;
      border-bottom: 1px solid var(--border);
      transition: transform 0.15s;
    }

    .post-item:first-child { padding-top: 0; }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }

    .post-date {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .post-category {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.15rem 0.55rem;
      border-radius: 4px;
      text-decoration: none;
    }

    .cat-ideas { background: rgba(88, 166, 255, 0.12); color: var(--accent); }
    .cat-tech { background: rgba(63, 185, 80, 0.12); color: var(--accent-green); }
    .cat-research { background: rgba(188, 140, 255, 0.12); color: var(--accent-purple); }
    .cat-opinion { background: rgba(240, 136, 62, 0.12); color: var(--accent-warm); }

    .post-title-link {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
      line-height: 1.35;
      display: block;
    }

    .post-title-link:hover { color: var(--accent); }

    .post-excerpt {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-top: 0.4rem;
      line-height: 1.65;
    }

    .read-more {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.88rem;
      white-space: nowrap;
    }

    .read-more:hover { text-decoration: underline; }

    .git-hash {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    .git-hash code {
      background: var(--bg-tertiary);
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
    }

    /* ===== Article Page ===== */
    .post-header {
      padding: 3rem 0 2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2.5rem;
    }

    .post-header h1 {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 1rem;
    }

    .post-header .post-meta {
      margin-bottom: 0;
    }

    /* ===== Article Content ===== */
    .post-content h2 {
      font-family: var(--font-display);
      font-size: 1.45rem;
      font-weight: 700;
      margin: 2.5rem 0 1rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }

    .post-content h3 {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      margin: 2rem 0 0.75rem;
    }

    .post-content p {
      margin-bottom: 1.25rem;
    }

    .post-content a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .post-content a:hover { text-decoration-color: transparent; }

    .post-content img {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    .post-content blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.5rem 1.2rem;
      margin: 1.5rem 0;
      background: var(--bg-secondary);
      border-radius: 0 6px 6px 0;
      color: var(--text-secondary);
    }

    .post-content blockquote p { margin-bottom: 0; }

    /* Code blocks */
    .post-content code {
      font-family: var(--font-mono);
      font-size: 0.85em;
      background: var(--bg-tertiary);
      padding: 0.15em 0.4em;
      border-radius: 4px;
    }

    .post-content pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.2rem 1.5rem;
      overflow-x: auto;
      margin: 1.5rem 0;
    }

    .post-content pre code {
      background: none;
      padding: 0;
      font-size: 0.82rem;
      line-height: 1.65;
    }

    /* Tables */
    .post-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.92rem;
    }

    .post-content th, .post-content td {
      padding: 0.65rem 1rem;
      border: 1px solid var(--border);
      text-align: left;
    }

    .post-content th {
      background: var(--bg-secondary);
      font-weight: 600;
    }

    .post-content td {
      background: var(--bg-card);
    }

    /* Video embeds */
    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      margin: 1.5rem 0;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .video-container iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
    }

    /* ===== Categories & Tags ===== */
    .category-list, .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      list-style: none;
      margin: 1.5rem 0;
    }

    .tag-chip {
      font-size: 0.78rem;
      padding: 0.25rem 0.7rem;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: all 0.2s;
    }

    .tag-chip:hover {
      background: var(--accent-glow);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ===== Archive ===== */
    .archive-year {
      font-family: var(--font-mono);
      font-size: 1.4rem;
      color: var(--accent);
      margin: 2.5rem 0 1rem;
      font-weight: 600;
    }

    .archive-year:first-of-type { margin-top: 1rem; }

    /* ===== Footer ===== */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
      font-size: 0.82rem;
      color: var(--text-muted);
      position: relative;
      z-index: 1;
    }

    .site-footer a {
      color: var(--text-secondary);
      text-decoration: none;
    }

    .site-footer a:hover { color: var(--accent); }

    .footer-git-info {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      margin-top: 0.5rem;
    }

    /* ===== Responsive ===== */
    @media (max-width: 640px) {
      html { font-size: 15px; }
      .container { padding: 1.5rem 1.2rem; }
      .home-hero h1 { font-size: 1.7rem; }
      .post-header h1 { font-size: 1.6rem; }
      .header-inner { padding: 0 1.2rem; }
      .site-nav { gap: 1rem; }
    }

    /* ===== MathJax Dark Mode ===== */
    mjx-container {
      color: var(--text-primary) !important;
      overflow-x: auto;
    }

    /* ===== Selection ===== */
    ::selection {
      background: rgba(88, 166, 255, 0.3);
      color: var(--text-primary);
    }
  </style>

  {% feed_meta %}
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
      <nav>
        <ul class="site-nav">
          <li><a href="{{ '/' | relative_url }}">Home</a></li>
          <li><a href="{{ '/categories' | relative_url }}">Categories</a></li>
          <li><a href="{{ '/archive' | relative_url }}">Archive</a></li>
          <li><a href="{{ '/about' | relative_url }}">About</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; {{ 'now' | date: "%Y" }} {{ site.author }} ·
      <a href="https://github.com/ylxfda/ylxfda.github.io/commits" target="_blank">Git commit history</a>
    </p>
    <p class="footer-git-info">Every post is immutably timestamped via Git</p>
  </footer>

</body>
</html>
